#!/usr/bin/env Rscript
suppressPackageStartupMessages({
  library(ggplot2)
  library(dplyr)
  library(patchwork)
  library(ggsignif)
})

## ---------- 1. 路径与参数 ----------
tsv     <- "/mnt/spareHD_2/oxphos_codeml_ready/09_codeml_sites_models/codeml_sites_summary.merged.tsv"
out_dir <- "/mnt/spareHD_2/oxphos_codeml_ready/09_codeml_sites_models/_figs_mt_vs_subunit_R"
dir.create(out_dir, showWarnings = FALSE, recursive = TRUE)

min_dS_tree <- 0.001
signif_only <- TRUE
alpha_level <- 0.05

# 统一字体大小规范
AXIS_TITLE_SIZE <- 24
AXIS_TEXT_SIZE  <- 18
STAR_LABEL_SIZE <- 8  # 显著性标注文字大小
PANEL_TAG_SIZE  <- 30

## ---------- 2. 读表与核心/非核心分类 ----------
df <- read.delim(tsv, header=TRUE, sep="\t", check.names=FALSE, stringsAsFactors=FALSE)
numify <- function(x) suppressWarnings(as.numeric(x))
df$omega <- numify(df$omega); df$dN <- numify(df$dN); df$dS <- numify(df$dS)

# 仅保留 M0 + (mt / subunit)
df <- df[df$model=="M0" & df$role %in% c("mt","subunit"), , drop=FALSE]

df$GENE_UP    <- toupper(df$gene)
df$COMPLEX_UP <- toupper(gsub("\\s+", "", df$complex))
has_suffix <- function(x, pat) grepl(paste0("^(", pat, ")[A-Z]?$"), x)

# 定义 Core 逻辑
is_core_CI <- with(df, role=="subunit" & COMPLEX_UP=="CI" & (has_suffix(GENE_UP, "NDUFS1|NDUFS2|NDUFS3|NDUFS7|NDUFS8") | has_suffix(GENE_UP, "NDUFV1|NDUFV2")))
is_core_CII <- with(df, role=="subunit" & COMPLEX_UP=="CII" & has_suffix(GENE_UP, "SDHA|SDHB|SDHC|SDHD"))
core_CV_F1 <- with(df, role=="subunit" & COMPLEX_UP=="CV" & (has_suffix(GENE_UP, "ATP5A1|ATP5B|ATP5C1|ATP5D") | has_suffix(GENE_UP, "ATP5F1A|ATP5F1B|ATP5F1C|ATP5F1D")))
core_CV_c  <- with(df, role=="subunit" & COMPLEX_UP=="CV" & has_suffix(GENE_UP, "ATP5G1|ATP5G2|ATP5G3|ATP5MC1|ATP5MC2|ATP5MC3"))

is_nu_core <- is_core_CI | is_core_CII | core_CV_F1 | core_CV_c

df$grp <- ifelse(df$role=="mt", "mt", ifelse(is_nu_core, "nu_core", "nu_noncore"))
df <- df[!is.na(df$grp), , drop=FALSE]
df$grp <- factor(df$grp, levels=c("mt","nu_core","nu_noncore"))

# 标签与配色 (简写)
label_map <- c(mt="mt", nu_core="nu-core", nu_noncore="nu-noncore")
fill_cols <- c(mt="#8CC6EC", nu_core="#F5A6A6", nu_noncore="#E5C16C")

## ---------- 3. 绘图与统计函数 ----------
p2star <- function(p) {
  if (is.na(p)) return("")
  if (p < 0.001) return("***")
  if (p < 0.01)  return("**")
  if (p < 0.05)  return("*")
  return("n.s.")
}

make_triple_plot <- function(metric, ylab, is_omega=FALSE) {
  dd <- df
  if (is_omega) dd <- dd[!is.na(dd$omega) & dd$omega<999 & !is.na(dd$dS) & dd$dS>=min_dS_tree, ]
  dd <- dd[!is.na(dd[[metric]]), ]
  
  cat("\n", paste(rep("=", 50), collapse = ""), "\n")
  cat("  METRIC:", metric, "\n")
  cat(paste(rep("=", 50), collapse = ""), "\n")
  
  # 1. 打印中位数统计
  meds <- dd %>% group_by(grp) %>% summarize(m = median(.data[[metric]]), .groups="drop")
  for(i in 1:nrow(meds)) cat(sprintf("Group %-10s | Median: %.6f\n", meds$grp[i], meds$m[i]))
  
  # 2. 两两比较 + BH 校正 (已修正变量名 dd)
  lvls  <- levels(dd$grp)
  pairs <- combn(lvls, 2, simplify = FALSE)
  pvals <- sapply(pairs, function(p) {
    wilcox.test(dd[[metric]][dd$grp==p[1]], dd[[metric]][dd$grp==p[2]], exact=FALSE)$p.value
  })
  padj  <- p.adjust(pvals, method="BH")
  
  # 3. 打印 P 值统计
  for(i in seq_along(pairs)) {
    cat(sprintf("  %s vs %s: P_adj = %.4e %s\n", 
                pairs[[i]][1], pairs[[i]][2], padj[i], 
                if(padj[i] < 0.05) "*" else ""))
  }
  
  # 4. 绘图
  rng <- range(dd[[metric]], na.rm=TRUE); spn <- diff(rng); if(spn==0) spn=1
  g <- ggplot(dd, aes(grp, .data[[metric]], fill=grp)) +
    geom_boxplot(width=0.55, colour="black", linewidth=0.8, outlier.shape=NA) +
    geom_point(position=position_jitter(width=0.12), size=1.8, shape=21, stroke=0.3, colour="black", alpha=0.7) +
    scale_fill_manual(values=fill_cols) +
    scale_x_discrete(labels=label_map) +
    labs(x=NULL, y=ylab) +
    theme_bw() +
    theme(
      text = element_text(family = "sans", face = "bold"),
      axis.title.y = element_text(size = AXIS_TITLE_SIZE, margin = margin(r = 10)),
      axis.text.x = element_text(size = AXIS_TEXT_SIZE, color = "black", angle = 45, hjust = 1), 
      axis.text.y = element_text(size = AXIS_TEXT_SIZE),
      legend.position = "none",
      panel.grid.minor = element_blank(),
      panel.grid.major.x = element_blank(),
      aspect.ratio = 1
    )
  
  # 显著性横线 (星号 vjust=1.2 挂在线下)
  y_top <- rng[2] + 0.1 * spn
  draw_count <- 0
  for (k in seq_along(padj)) {
    if (padj[k] >= alpha_level && signif_only) next
    cur_y <- y_top + draw_count * 0.15 * spn
    g <- g + geom_signif(comparisons = list(pairs[[k]]), 
                         annotations = p2star(padj[k]),
                         y_position = cur_y, textsize = STAR_LABEL_SIZE, 
                         vjust = 0.6, tip_length = 0.02, size = 0.6)
    draw_count <- draw_count + 1
  }
  
  if(draw_count > 0) {
    g <- g + coord_cartesian(ylim = c(rng[1] - 0.05 * spn, y_top + draw_count * 0.18 * spn), clip = "off")
  }
  
  return(g)
}

## ---------- 4. 拼图并保存 ----------

p_dn <- make_triple_plot("dN",    expression(d[N]))
p_ds <- make_triple_plot("dS",    expression(d[S]))
p_om <- make_triple_plot("omega", expression(d[N]/d[S]), is_omega=TRUE)

combined <- (p_dn | p_ds | p_om) + 
  plot_annotation(tag_levels = 'A') & 
  theme(plot.tag = element_text(size = PANEL_TAG_SIZE, face = "bold"))

# 打印到 R 窗口
print(combined)

# 保存文件
file_stub <- file.path(out_dir, "Panel_mt_nuCore_nuNoncore_Final")
ggsave(paste0(file_stub, ".png"), combined, width=18, height=7.5, dpi=300)
ggsave(paste0(file_stub, ".pdf"), combined, width=18, height=7.5, device=cairo_pdf)

