#rp&ars
#!/usr/bin/env Rscript
suppressPackageStartupMessages({
  library(ggplot2)
  library(ggsignif)
  library(patchwork)
})

## ====== 1. 路径与参数 ======
tsv     <- "/mnt/spareHD_2/oxphos_codeml_ready/09_codeml_sites_models/nu/codeml_sites_summary.with_cat.tsv"
out_dir <- "/mnt/spareHD_2/oxphos_codeml_ready/09_codeml_sites_models/_figs_cyto_vs_Nmt_individual"
dir.create(out_dir, recursive = TRUE, showWarnings = FALSE)

min_dS_tree <- 0.001   
signif_only <- TRUE    
alpha_level <- 0.05

## ====== 2. 读表 & 预处理 ======
df <- read.delim(tsv, header = TRUE, sep = "\t", stringsAsFactors = FALSE, check.names = FALSE)
numify <- function(x) suppressWarnings(as.numeric(x))
if ("omega" %in% names(df)) df$omega <- numify(df$omega)
if ("dN"    %in% names(df)) df$dN    <- numify(df$dN)
if ("dS"    %in% names(df)) df$dS    <- numify(df$dS)

if ("model" %in% names(df)) df <- df[df$model == "M0", , drop = FALSE]

# 统一 role 命名
df$role <- tolower(df$role)
df$role <- gsub("^nu-", "nmt-", df$role)
df$role <- sub("rp$", "ribo", df$role)
df$role <- sub("rp-", "ribo-", df$role)

## ====== 3. 核心绘图函数 ======
p_to_stars <- function(p) {
  if (is.na(p)) return("n.s.")
  if (p < 0.001) return("***")
  if (p < 0.01)  return("**")
  if (p < 0.05)  return("*")
  return("n.s.")
}

make_plot <- function(dat, grp_left, grp_right, metric, ylab, lab_left, lab_right, col_left, col_right, is_omega=FALSE) {
  
  dd <- dat[dat$role %in% c(grp_left, grp_right), ]
  if (is_omega) {
    dd <- dd[!is.na(dd$omega) & dd$omega < 999 & !is.na(dd$dS) & dd$dS >= min_dS_tree, ]
  }
  dd <- dd[!is.na(dd[[metric]]), ]
  dd$role <- factor(dd$role, levels = c(grp_left, grp_right))
  
  # 统计计算
  p_val <- if(length(unique(dd$role)) == 2) {
    wilcox.test(dd[[metric]] ~ dd$role, exact=FALSE)$p.value
  } else { NA }
  star  <- p_to_stars(p_val)
  
  # 获取中位数
  meds <- aggregate(dd[[metric]], list(Role = dd$role), median, na.rm = TRUE)
  
  rng <- range(dd[[metric]], na.rm = TRUE); spn <- diff(rng)
  if (spn == 0) spn <- 1
  
  # === 统一字体参数 ===
  AXIS_TITLE_SIZE <- 24
  AXIS_TEXT_SIZE  <- 18
  STAR_SIZE       <- 8  # ggsignif 的 textsize
  
  g <- ggplot(dd, aes(role, .data[[metric]], fill=role)) +
    geom_boxplot(width=0.5, colour="black", linewidth=0.8, outlier.shape=NA) +
    geom_point(position=position_jitter(width=0.12), size=2.5, shape=21, stroke=0.4, colour="black") +
    scale_fill_manual(values=c(col_left, col_right), guide="none") +
    scale_x_discrete(labels=c(lab_left, lab_right)) +
    labs(x=NULL, y=ylab) +
    theme_bw(base_size = AXIS_TEXT_SIZE) +
    theme(
      text = element_text(family = "sans", face = "bold"),
      axis.title.y = element_text(size = AXIS_TITLE_SIZE, margin = margin(r = 10)),
      axis.text.x = element_text(size = AXIS_TEXT_SIZE, color = "black", angle = 45, hjust = 1), 
      axis.text.y = element_text(size = AXIS_TEXT_SIZE),
      panel.grid.minor = element_blank(),
      panel.grid.major.x = element_blank(),
      aspect.ratio = 1  # 强制正方形
    )
  
  if (!is.na(p_val) && (p_val < alpha_level || !signif_only)) {
    y_pos <- rng[2] + 0.15 * spn
    g <- g + ggsignif::geom_signif(
      comparisons = list(c(grp_left, grp_right)), annotations = star,
      y_position = y_pos, tip_length = 0.02,
      textsize = STAR_SIZE, vjust = 0.5, size = 0.8
    ) + coord_cartesian(ylim = c(rng[1] - 0.05 * spn, y_pos + 0.2 * spn), clip = "off")
  }
  
  return(list(plot=g, p=p_val, meds=meds))
}

## ====== 4. 执行绘图与保存 ======

COL_RIBO <- c("#3BA2D0", "#F29F3D") 
COL_ARS  <- c("#4C6FB3", "#E06C9F") 

tasks <- list(
  ribo = list(l="cyto-ribo", r="nmt-ribo", ll="cyto-RP", lr="Nmt-RP", cols=COL_RIBO),
  ars  = list(l="cyto-ars",  r="nmt-ars",  ll="cyto-ARS", lr="Nmt-ARS", cols=COL_ARS)
)

for (type in names(tasks)) {
  t <- tasks[[type]]
  
  res_dn <- make_plot(df, t$l, t$r, "dN",    expression(d[N]), t$ll, t$lr, t$cols[1], t$cols[2])
  res_ds <- make_plot(df, t$l, t$r, "dS",    expression(d[S]), t$ll, t$lr, t$cols[1], t$cols[2])
  res_om <- make_plot(df, t$l, t$r, "omega", expression(d[N]/d[S]), t$ll, t$lr, t$cols[1], t$cols[2], is_omega=TRUE)
  
  # 拼接 A, B, C
  combined <- (res_dn$plot | res_ds$plot | res_om$plot) + 
    plot_annotation(tag_levels = 'A') & 
    theme(plot.tag = element_text(size = 22, face = "bold"))
  
  # 打印预览
  print(combined)
  
  # 保存 (18x6 比例确保子图正方形)
  file_base <- file.path(out_dir, paste0("Panel_", type, "_individual"))
  ggsave(paste0(file_base, ".png"), combined, width=18, height=6, dpi=300)
  ggsave(paste0(file_base, ".pdf"), combined, width=18, height=6, device=cairo_pdf)
  
  # 控制台打印统计
  cat("\n", paste(rep("=", 40), collapse = ""), "\n")
  cat("Grouping:", toupper(type), "\n")
  cat("dN p-val:", sprintf("%.4e", res_dn$p), " (Median:", paste(res_dn$meds$x, collapse="/"), ")\n")
  cat("dS p-val:", sprintf("%.4e", res_ds$p), " (Median:", paste(res_ds$meds$x, collapse="/"), ")\n")
  cat("om p-val:", sprintf("%.4e", res_om$p), " (Median:", paste(res_om$meds$x, collapse="/"), ")\n")
  cat(paste(rep("=", 40), collapse = ""), "\n")
}

