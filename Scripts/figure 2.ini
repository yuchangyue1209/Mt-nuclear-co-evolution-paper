#complex
#!/usr/bin/env Rscript
suppressPackageStartupMessages({
  library(ggplot2)
  library(dplyr)
  library(patchwork)
})

## ---------- 1. 路径与参数 ----------
tsv  <- "/mnt/spareHD_2/oxphos_codeml_ready/09_codeml_sites_models/codeml_sites_summary.merged.tsv"
outd <- "/mnt/spareHD_2/oxphos_codeml_ready/09_codeml_sites_models/_figs_mt_vs_subunit_R/complex_mt_nu_ass_stars"
dir.create(outd, recursive = TRUE, showWarnings = FALSE)

min_dS_tree <- 0.001   
signif_only <- TRUE    
alpha_level <- 0.05

# 字体规范 (严格对齐 Figure 2)
AXIS_TITLE_SIZE  <- 24
AXIS_TEXT_SIZE   <- 18
STAR_LABEL_SIZE  <- 9   # 放大星号
PANEL_TAG_SIZE   <- 30  # 放大 A/B/C 标签

## ---------- 2. 数据处理 ----------
df <- read.delim(tsv, header=TRUE, sep="\t", stringsAsFactors=FALSE, check.names=FALSE)
numify <- function(x) suppressWarnings(as.numeric(x))
df$omega <- numify(df$omega); df$dN <- numify(df$dN); df$dS <- numify(df$dS)

df <- df[df$model=="M0" & df$role %in% c("mt","subunit","assembly_factor"), , drop=FALSE]

# Complex 归一化 (I-V)
df$complex <- toupper(trimws(df$complex))
df$Complex <- dplyr::recode(df$complex,
                            "CI"="I","C I"="I","I"="I", "CII"="II","C II"="II","II"="II",
                            "CIII"="III","C III"="III","III"="III", "CIV"="IV","C IV"="IV","IV"="IV",
                            "CV"="V","C V"="V","V"="V", .default = NA_character_)
df <- df[!is.na(df$Complex), , drop=FALSE]
df$Complex <- factor(df$Complex, levels=c("I","II","III","IV","V"))

# 角色映射与配色 (简写图例)
roles_kept <- c("mt","subunit","assembly_factor")
df$role <- factor(df$role, levels=roles_kept)
role_labels <- c(mt="mt", subunit="nu", assembly_factor="ass")
palette3    <- c(mt="#8CC6EC", subunit="#F5A6A6", assembly_factor="#BFD99B")

## ---------- 3. 统计绘图函数 ----------
p2star <- function(p){
  if (is.na(p)) ""
  else if (p < 0.001) "***"
  else if (p < 0.01)  "**"
  else if (p < 0.05)  "*"
  else ""
}

make_complex_plot <- function(metric, ylab, is_omega=FALSE) {
  d <- df
  if (is_omega) {
    d <- d[!is.na(d$omega) & d$omega < 999 & !is.na(d$dS) & d$dS >= min_dS_tree, ]
  }
  d <- d[!is.na(d[[metric]]), ]
  
  cat("\n", paste(rep("=", 60), collapse = ""), "\n")
  cat("  STATISTICS FOR:", metric, "\n")
  cat(paste(rep("=", 60), collapse = ""), "\n")

  dodge_w <- 0.75
  
  g <- ggplot(d, aes(x=Complex, y=.data[[metric]], fill=role)) +
    geom_boxplot(position=position_dodge(width=dodge_w), width=0.6, 
                 colour="black", linewidth=0.8, outlier.shape=NA) +
    geom_point(position=position_jitterdodge(jitter.width=0.1, dodge.width=dodge_w),
               size=1.5, shape=21, stroke=0.3, colour="black", alpha=0.7) +
    scale_fill_manual(values=palette3, labels=role_labels) +
    labs(x=NULL, y=ylab) +
    theme_bw() +
    theme(
      text = element_text(family = "sans", face = "bold"),
      axis.title.y = element_text(size = AXIS_TITLE_SIZE, margin = margin(r = 10)),
      axis.text.x = element_text(size = AXIS_TEXT_SIZE, color = "black"), 
      axis.text.y = element_text(size = AXIS_TEXT_SIZE),
      legend.position = "none",
      panel.grid.minor = element_blank(),
      panel.grid.major.x = element_blank(),
      aspect.ratio = 1 # 保持正方形
    )

  # 统计计算与打印
  yr <- range(d[[metric]], na.rm=TRUE); spn <- diff(yr); if(spn==0) spn=1
  x_lvls <- levels(d$Complex)
  seg_list <- list(); txt_list <- list()

  for (i in seq_along(x_lvls)) {
    cx <- x_lvls[i]
    di <- d[d$Complex == cx, ]
    
    # 打印中位数
    meds <- di %>% group_by(role) %>% summarise(m = median(.data[[metric]], na.rm=TRUE), .groups="drop")
    cat(sprintf("Complex %s | Medians: %s\n", cx, paste(paste0(meds$role,":",round(meds$m,4)), collapse=" ")))

    roles_present <- roles_kept[roles_kept %in% unique(di$role)]
    if (length(roles_present) < 2) next
    
    comp_pairs <- combn(roles_present, 2, simplify=FALSE)
    pvals <- sapply(comp_pairs, function(p){
      wilcox.test(di[[metric]][di$role==p[1]], di[[metric]][di$role==p[2]], exact=FALSE)$p.value
    })
    padj <- p.adjust(pvals, "BH")
    
    y_base <- yr[2] + 0.1 * spn
    draw_count <- 0
    for (k in seq_along(padj)) {
      star_lab <- p2star(padj[k])
      if (signif_only && star_lab == "") next
      
      pair <- comp_pairs[[k]]
      xi <- ((match(pair[1], roles_kept) - 2) / 3) * dodge_w + i
      xj <- ((match(pair[2], roles_kept) - 2) / 3) * dodge_w + i
      
      cur_y <- y_base + draw_count * 0.15 * spn
      seg_list[[length(seg_list)+1]] <- data.frame(x=xi, xend=xj, y=cur_y, yend=cur_y)
      # vjust=1.2 将星号挂在线下方
      txt_list[[length(txt_list)+1]] <- data.frame(x=(xi+xj)/2, y=cur_y, lab=star_lab)
      draw_count <- draw_count + 1
    }
  }
  
  if (length(seg_list) > 0) {
    df_seg <- do.call(rbind, seg_list); df_txt <- do.call(rbind, txt_list)
    g <- g + 
      geom_segment(data=df_seg, aes(x=x, xend=xend, y=y, yend=y), inherit.aes=FALSE, linewidth=0.6) +
      geom_text(data=df_txt, aes(x=x, y=y, label=lab), inherit.aes=FALSE, 
                size=STAR_LABEL_SIZE, vjust=1.2, fontface="bold")
    
    y_limit_top <- max(df_txt$y) + 0.15 * spn
    g <- g + coord_cartesian(ylim = c(yr[1] - 0.05 * spn, y_limit_top), clip = "off")
  }
  return(g)
}

## ---------- 4. 拼图展示与保存 ----------
p1 <- make_complex_plot("dN",    expression(d[N]))
p2 <- make_complex_plot("dS",    expression(d[S]))
p3 <- make_complex_plot("omega", expression(d[N]/d[S]), is_omega=TRUE)

combined <- (p1 | p2 | p3) + 
  plot_layout(guides = "collect") +
  plot_annotation(tag_levels = 'A') & 
  theme(legend.position = "top", 
        legend.title = element_blank(),
        legend.text = element_text(size = 20, face = "bold"),
        plot.tag = element_text(size = PANEL_TAG_SIZE, face = "bold"))

# 在屏幕上显示 (Print)
print(combined)

# 保存文件
final_out <- file.path(outd, "Complex_Panel_Staged_Stars.png")
ggsave(final_out, combined, width=18, height=7.5, dpi=300)
ggsave(gsub(".png", ".pdf", final_out), combined, width=18, height=7.5, device=cairo_pdf)

cat("\n[Success] 统计结果已打印，图片已保存至:", outd, "\n")


