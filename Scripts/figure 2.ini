suppressPackageStartupMessages({
  library(ggplot2)
  library(ggsignif)
  library(patchwork) 
})

## ====== 1. 路径与参数 ======
# 请根据你的实际路径修改 tsv 路径
tsv     <- "/mnt/spareHD_2/oxphos_codeml_ready/09_codeml_sites_models/codeml_sites_summary.merged.tsv"
out_dir <- "/mnt/spareHD_2/oxphos_codeml_ready/09_codeml_sites_models/_figs_mt_vs_subunit_R"
dir.create(out_dir, showWarnings = FALSE, recursive = TRUE)

min_dS_tree <- 0.001   # dN/dS 质量过滤阈值
signif_only <- TRUE    # TRUE=只在显著时标星号
alpha_level <- 0.05

## ====== 2. 数据准备 ======
df_raw <- read.delim(tsv, header = TRUE, sep = "\t", check.names = FALSE, stringsAsFactors = FALSE)
numify <- function(x) suppressWarnings(as.numeric(x))
df_raw$omega <- numify(df_raw$omega)
df_raw$dN    <- numify(df_raw$dN)
df_raw$dS    <- numify(df_raw$dS)

# 核心过滤：只保留 mt 和 subunit
keep_roles <- c("mt", "subunit")
df_filtered <- df_raw[df_raw$model == "M0" & df_raw$role %in% keep_roles, , drop = FALSE]
df_filtered$role <- factor(df_filtered$role, levels = keep_roles)

label_map <- c(mt = "mtOXPHOS", subunit = "nuOXPHOS")
fill_cols <- c(mt = "#8CC6EC", subunit = "#F5A6A6")

## ====== 3. 统计辅助函数 ======
p_to_stars <- function(p) {
  if (is.na(p)) return("n.s.")
  if (p < 0.001) return("***")
  if (p < 0.01)  return("**")
  if (p < 0.05)  return("*")
  return("n.s.")
}

## ====== 4. 绘图核心函数 (强制正方形 + 斜角文字) ======
make_single_plot <- function(metric, ylab, filter_for_omega = FALSE) {
  dd <- df_filtered
  if (filter_for_omega) {
    # 针对 dN/dS 的特殊过滤逻辑
    dd <- dd[!is.na(dd$omega) & dd$omega < 999 & !is.na(dd$dS) & dd$dS >= min_dS_tree, ]
  }
  dd <- dd[!is.na(dd[[metric]]), , drop = FALSE]
  
  # Wilcoxon 检验 (两组对比)
  p_val <- if(length(unique(dd$role)) == 2) {
    wilcox.test(dd[[metric]] ~ dd$role, exact = FALSE)$p.value
  } else { NA }
  star <- p_to_stars(p_val)
  
  # 获取两组的中位数用于打印输出
  meds <- aggregate(dd[[metric]], list(Role = dd$role), median, na.rm = TRUE)
  
  rng <- range(dd[[metric]], na.rm = TRUE)
  spn <- diff(rng); if (spn == 0) spn <- 1
  
  # 统一样式参数
  AXIS_TITLE_SIZE <- 24
  AXIS_TEXT_SIZE  <- 18
  STAR_SIZE       <- 8
  
  g <- ggplot(dd, aes(x = role, y = .data[[metric]], fill = role)) +
    geom_boxplot(width = 0.5, colour = "black", linewidth = 0.8, outlier.shape = NA) +
    geom_point(position = position_jitter(width = 0.12), size = 2.5, shape = 21, stroke = 0.4, colour = "black") +
    scale_fill_manual(values = fill_cols, guide = "none") +
    scale_x_discrete(labels = label_map) +
    labs(x = NULL, y = ylab) +
    theme_bw(base_size = 18) + 
    theme(
      text = element_text(family = "sans", face = "bold"),
      axis.title.y = element_text(size = AXIS_TITLE_SIZE, margin = margin(r = 10)),
      # 标签旋转 45 度
      axis.text.x = element_text(size = AXIS_TEXT_SIZE, color = "black", angle = 45, hjust = 1), 
      axis.text.y = element_text(size = AXIS_TEXT_SIZE),
      panel.grid.minor = element_blank(),
      panel.grid.major.x = element_blank(),
      # 强制子图内部绘图区比例为 1:1 正方形
      aspect.ratio = 1
    )
  
  # 显著性标注逻辑
  if (!is.na(p_val) && (p_val < alpha_level || !signif_only)) {
    y_pos <- rng[2] + 0.15 * spn
    g <- g + ggsignif::geom_signif(
      comparisons = list(c("mt", "subunit")), annotations = star,
      y_position = y_pos, tip_length = 0.02,
      textsize = STAR_SIZE, vjust = 0.5, size = 0.8
    ) +
      coord_cartesian(ylim = c(rng[1] - 0.05 * spn, y_pos + 0.15 * spn), clip = "off")
  }
  
  return(list(plot = g, p = p_val, medians = meds))
}

## ====== 5. 拼图、打印统计与保存 ======

# 计算三个指标
res_dN    <- make_single_plot("dN",    expression(d[N]))
res_dS    <- make_single_plot("dS",    expression(d[S]))
res_omega <- make_single_plot("omega", expression(d[N] / d[S]), filter_for_omega = TRUE)

# 使用 patchwork 合并 A, B, C
combined_plot <- (res_dN$plot | res_dS$plot | res_omega$plot) + 
  plot_annotation(tag_levels = 'A') & 
  theme(plot.tag = element_text(size = 22, face = "bold"))

# --- 打印统计摘要到 Console ---
cat("\n" , paste(rep("=", 50), collapse = ""), "\n")
cat("Figure 2 统计摘要 (mtOXPHOS vs nuOXPHOS):\n")

report <- function(name, obj) {
  cat(sprintf("\n[%s]\n  P-value: %.4e (%s)\n  Medians:\n", 
              name, obj$p, p_to_stars(obj$p)))
  print(obj$medians)
}
report("dN", res_dN)
report("dS", res_dS)
report("omega", res_omega)
cat("\n" , paste(rep("=", 50), collapse = ""), "\n")

# --- 保存文件 (关键尺寸: 18x6 确保 3:1 扁长总图) ---
W <- 18
H <- 6

ggsave(file.path(out_dir, "Figure2_mt_vs_nu_Final.png"), combined_plot, width = W, height = H, dpi = 300)
ggsave(file.path(out_dir, "Figure2_mt_vs_nu_Final.pdf"), combined_plot, width = W, height = H, device = cairo_pdf)

# --- 屏幕预览 ---
print(combined_plot)

cat("\n[Success] Figure 2 已保存至:", out_dir, "\n")


