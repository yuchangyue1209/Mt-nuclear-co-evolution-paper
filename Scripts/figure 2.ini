## ====== 1. 路径与参数 ======
tsv     <- "/mnt/spareHD_2/oxphos_codeml_ready/09_codeml_sites_models/codeml_sites_summary.merged.tsv"
out_dir <- "/mnt/spareHD_2/oxphos_codeml_ready/09_codeml_sites_models/_figs_mt_vs_subunit_R"
dir.create(out_dir, showWarnings = FALSE, recursive = TRUE)

min_dS_tree <- 0.001   
signif_only <- TRUE    
alpha_level <- 0.05

## ====== 2. 数据准备 ======
df_raw <- read.delim(tsv, header = TRUE, sep = "\t", check.names = FALSE, stringsAsFactors = FALSE)
numify <- function(x) suppressWarnings(as.numeric(x))
df_raw$omega <- numify(df_raw$omega)
df_raw$dN    <- numify(df_raw$dN)
df_raw$dS    <- numify(df_raw$dS)

keep_roles <- c("mt", "subunit", "assembly_factor")
df_filtered <- df_raw[df_raw$model == "M0" & df_raw$role %in% keep_roles, , drop = FALSE]
df_filtered$role <- factor(df_filtered$role, levels = keep_roles)

label_map <- c(mt = "mtOXPHOS", subunit = "nuOXPHOS", assembly_factor = "nu Assembly Factor")
fill_cols <- c(mt = "#8CC6EC", subunit = "#F5A6A6", assembly_factor = "#BFD99B")

## ====== 3. 统计函数 ======
p_to_stars <- function(p) {
  if (is.na(p)) return("n.s.")
  if (p < 0.001) return("***")
  if (p < 0.01)  return("**")
  if (p < 0.05)  return("*")
  return("n.s.")
}

calc_stats <- function(dd, metric) {
  roles <- levels(dd$role)
  comps <- combn(roles, 2, simplify = FALSE)
  res <- lapply(comps, function(pr) {
    x <- dd[[metric]][dd$role == pr[1]]
    y <- dd[[metric]][dd$role == pr[2]]
    p_val <- if(length(x)>1 && length(y)>1) wilcox.test(x, y, exact=FALSE)$p.value else NA
    data.frame(Group1=pr[1], Group2=pr[2], p_raw=p_val)
  })
  stat_df <- do.call(rbind, res)
  stat_df$p_adj <- p.adjust(stat_df$p_raw, method = "BH")
  stat_df$stars <- sapply(stat_df$p_adj, p_to_stars)
  return(stat_df)
}

## ====== 4. 修改后的绘图函数 (修复 object 'dd' not found) ======

make_single_plot <- function(metric, ylab, filter_for_omega = FALSE) {
  dd <- df_filtered
  if (filter_for_omega) {
    dd <- dd[!is.na(dd$omega) & dd$omega < 999 & !is.na(dd$dS) & dd$dS >= min_dS_tree, ]
  }
  dd <- dd[!is.na(dd[[metric]]), , drop = FALSE]
  
  stat_res <- calc_stats(dd, metric)
  pw_plot  <- if(signif_only) subset(stat_res, p_adj < alpha_level) else stat_res
  rng <- range(dd[[metric]], na.rm = TRUE)
  spn <- diff(rng); if (spn == 0) spn <- 1
  
  # 统一字体大小
  AXIS_TITLE_SIZE <- 24
  AXIS_TEXT_SIZE  <- 18
  STAR_SIZE       <- 8
  
  g <- ggplot(dd, aes(x = role, y = .data[[metric]], fill = role)) +
    geom_boxplot(width = 0.5, colour = "black", linewidth = 0.8, outlier.shape = NA) +
    geom_point(position = position_jitter(width = 0.1), size = 2.5, shape = 21, stroke = 0.4, colour = "black") +
    scale_fill_manual(values = fill_cols, guide = "none") +
    scale_x_discrete(labels = label_map) +
    labs(x = NULL, y = ylab) +
    theme_bw(base_size = 18) + 
    theme(
      text = element_text(family = "sans", face = "bold"),
      axis.title.y = element_text(size = AXIS_TITLE_SIZE, margin = margin(r = 10)),
      # === 这里设置斜着显示文字 ===
      axis.text.x = element_text(size = AXIS_TEXT_SIZE, color = "black", angle = 45, hjust = 1), 
      axis.text.y = element_text(size = AXIS_TEXT_SIZE),
      panel.grid.minor = element_blank(),
      panel.grid.major.x = element_blank(),
      # 强制绘图区比例为 1:1
      aspect.ratio = 1
    )
  
  if (nrow(pw_plot) > 0) {
    comps <- Map(function(a, b) c(a, b), pw_plot$Group1, pw_plot$Group2)
    y_pos <- rng[2] + 0.15 * spn + (seq_len(nrow(pw_plot)) - 1) * 0.15 * spn
    g <- g + ggsignif::geom_signif(
      comparisons = comps, annotations = pw_plot$stars,
      y_position = y_pos, tip_length = 0.02,
      textsize = STAR_SIZE, vjust = 0.5, size = 0.8
    ) +
      coord_cartesian(ylim = c(rng[1] - 0.05 * spn, max(y_pos) + 0.22 * spn), clip = "off")
  }
  return(g)
}
# 生成子图
