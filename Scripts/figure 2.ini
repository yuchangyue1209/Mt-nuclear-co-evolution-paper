  # 打印预览
  print(combined)
  
  # 保存 (18x6 比例确保子图正方形)
  file_base <- file.path(out_dir, paste0("Panel_", type, "_individual"))
  ggsave(paste0(file_base, ".png"), combined, width=18, height=6, dpi=300)
  ggsave(paste0(file_base, ".pdf"), combined, width=18, height=6, device=cairo_pdf)
  
  # 控制台打印统计
  cat("\n", paste(rep("=", 40), collapse = ""), "\n")
  cat("Grouping:", toupper(type), "\n")
  cat("dN p-val:", sprintf("%.4e", res_dn$p), " (Median:", paste(res_dn$meds$x, collapse="/"), ")\n")
  cat("dS p-val:", sprintf("%.4e", res_ds$p), " (Median:", paste(res_ds$meds$x, collapse="/"), ")\n")
