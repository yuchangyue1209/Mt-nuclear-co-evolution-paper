# 定义一个内部函数用于格式化打印
print_metrics_stats <- function(metric_name) {
  cat("\n[ 指标:", metric_name, "]\n")
  # 重新调用统计计算函数
  # 注意：omega 需要使用过滤后的数据
  dd_for_stats <- if(metric_name == "omega") {
    df_filtered[!is.na(df_filtered$omega) & df_filtered$omega < 999 & 
                  !is.na(df_filtered$dS) & df_filtered$dS >= min_dS_tree, ]
  } else {
    df_filtered[!is.na(df_filtered[[metric_name]]), ]
  }
  
  stats_df <- calc_stats(dd_for_stats, metric_name)
  print(stats_df, row.names = FALSE)
}

