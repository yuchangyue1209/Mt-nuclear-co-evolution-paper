  res_om <- make_plot(df, t$l, t$r, "omega", expression(d[N]/d[S]), t$ll, t$lr, t$cols[1], t$cols[2], is_omega=TRUE)
  
  # 拼接 A, B, C
  combined <- (res_dn$plot | res_ds$plot | res_om$plot) + 
